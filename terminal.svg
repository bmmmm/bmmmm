<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <style>
    .bg { fill: #0D0D0D; }
    .bar { fill: #1A1A1A; }
    .title { fill: #6B7280; font-family: "Courier New", Courier, monospace; font-size: 12px; }
    .prompt { fill: #C084FC; font-family: "Courier New", Courier, monospace; font-size: 13px; }
    .cmd { fill: #E2E8F0; font-family: "Courier New", Courier, monospace; font-size: 13px; }
    .out { fill: #E2E8F0; font-family: "Courier New", Courier, monospace; font-size: 13px; }
    .dim { fill: #6B7280; font-family: "Courier New", Courier, monospace; font-size: 13px; }
    .accent { fill: #C084FC; font-family: "Courier New", Courier, monospace; font-size: 13px; }
    .cursor { fill: #C084FC; }
  </style>
  <rect width="600" height="280" rx="8" class="bg"/>
  <rect width="600" height="36" rx="8" class="bar"/>
  <rect y="18" width="600" height="18" class="bar"/>
  <circle cx="20" cy="18" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="18" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="18" r="6" fill="#28C840"/>
  <text x="300" y="23" text-anchor="middle" class="title">zsh -- 80x24</text>
  <text x="24" y="68"><tspan class="prompt">~ $</tspan><tspan class="cmd"> whoami</tspan></text>
  <text x="24" y="90" class="out">curious.</text>
  <text x="24" y="120"><tspan class="prompt">~ $</tspan><tspan class="cmd"> ls ./projects</tspan></text>
  <text x="24" y="142"><tspan class="accent">claudii</tspan><tspan class="dim">    other-things</tspan></text>
  <text x="24" y="172"><tspan class="prompt">~ $</tspan><tspan class="cmd"> cat ./motivation.txt</tspan></text>
  <text x="24" y="194" class="dim">cat: ./motivation.txt: too personal</text>
  <text x="24" y="230"><tspan class="prompt">~ $</tspan><tspan class="cmd"> </tspan></text>
  <rect x="55" y="218" width="8" height="14" class="cursor"><animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/></rect>
  <text x="24" y="262" class="dim"># knowers know</text>
</svg>